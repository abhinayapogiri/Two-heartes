name: Deploy to EC2

on:
  push:
    branches:
      - main   #branch
      

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Connect to EC2 and deploy
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          
          script: |
             cd /home/ubuntu/Two-heartes
             git fetch origin
             git reset --hard origin/main
             sudo systemctl restart movieapp